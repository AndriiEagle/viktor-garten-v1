name: Gallery role audit

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  gallery-role-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check gallery visual role gate
        run: node tools/audit-gallery-roles.mjs

      - name: Check site audit
        run: node tools/audit-site.mjs
